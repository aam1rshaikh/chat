<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aamir Shaikh &amp; Bushra Khan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a0a1e;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 24px 0 36px; gap: 18px;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(160,0,100,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 20%, rgba(120,0,160,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(80,0,80,0.4) 0%, transparent 70%);
  pointer-events: none;
}

.hearts-bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.heart-particle {
  position: absolute; bottom: -60px; opacity: 0;
  animation: floatHeart linear infinite;
  filter: blur(0.5px);
}
@keyframes floatHeart {
  0%   { transform: translateY(0) scale(0.6) rotate(-10deg); opacity: 0; }
  10%  { opacity: 0.4; }
  80%  { opacity: 0.15; }
  100% { transform: translateY(-110vh) scale(1.1) rotate(10deg); opacity: 0; }
}

/* ── Sunset Banner ── */
.sunset-banner {
  width: 100%;
  height: 56px;
  position: relative;
  cursor: pointer;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.sunset-banner:hover {
  filter: brightness(1.08);
}
.sunset-banner:hover .button-bg {
  fill-opacity: 0.45;
  stroke-opacity: 0.75;
}
.sunset-banner:active {
  transform: scale(0.98);
}


/* ── Top nav ── */
.top-nav {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; max-width: 440px; width: 100%; padding: 0 16px;
  position: relative; z-index: 10;
}

/* Title card */
.title-card {
  text-align: center; padding: 10px 20px 8px;
  background: rgba(60,0,50,0.45);
  border: 1px solid rgba(220,80,160,0.2);
  border-radius: 16px;
  backdrop-filter: blur(12px);
  width: 100%;
}
.title-names {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 600;
  color: #ffd6ee;
  letter-spacing: 0.5px;
}
.title-names .amp { color: rgba(255,130,190,0.7); font-style: italic; font-weight: 400; margin: 0 4px; }
.title-sub {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  margin-top: 3px;
}
.title-page {
  font-size: 11px; font-weight: 300;
  color: rgba(255,160,210,0.55);
  letter-spacing: 1.5px; text-transform: uppercase;
}
.title-sep { color: rgba(255,100,160,0.4); font-size: 10px; }
.title-dates {
  font-size: 12px; font-weight: 400;
  color: rgba(255,180,220,0.65);
  font-style: italic;
  letter-spacing: 0.3px;
}
.title-heart { color: rgba(255,80,140,0.5); font-size: 9px; }

/* Nav row */
.nav-row {
  display: flex; align-items: center; gap: 8px; width: 100%;
}
.nav-btn {
  background: rgba(80,0,60,0.55);
  border: 1px solid rgba(220,80,160,0.25);
  color: rgba(255,180,220,0.85);
  padding: 7px 18px; border-radius: 20px; font-size: 13px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  font-family: 'Inter', sans-serif; letter-spacing: 0.3px;
  backdrop-filter: blur(8px);
}
.nav-btn:hover { background: rgba(130,0,90,0.65); color: #ffd6ee; border-color: rgba(255,100,180,0.4); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }

/* ── Bookmark button ── */
.bookmark-btn {
  background: rgba(80,0,60,0.55);
  border: 1px solid rgba(220,80,160,0.25);
  color: rgba(255,180,220,0.85);
  padding: 7px 14px; border-radius: 20px; font-size: 13px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  font-family: 'Inter', sans-serif; letter-spacing: 0.3px;
  backdrop-filter: blur(8px); display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.bookmark-btn:hover { background: rgba(130,0,90,0.65); color: #ffd6ee; border-color: rgba(255,100,180,0.4); }
.bookmark-btn.saved {
  background: rgba(160,0,100,0.45);
  border-color: rgba(255,80,160,0.5);
  color: #ffb0d8;
}

/* ── Welcome back toast ── */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: rgba(60,0,50,0.92);
  border: 1px solid rgba(255,80,160,0.35);
  color: #ffd6ee; font-size: 13px; font-family: 'Inter', sans-serif;
  padding: 10px 22px; border-radius: 24px;
  backdrop-filter: blur(16px);
  box-shadow: 0 4px 24px rgba(160,0,100,0.4);
  z-index: 9999; pointer-events: none;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
  opacity: 0; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Bookmark badge on title card ── */
.bookmark-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: rgba(255,140,200,0.6);
  font-style: italic; margin-top: 2px;
  font-family: 'Inter', sans-serif;
}

/* Dropdown — aesthetic pill */
.select-wrap {
  flex: 1; position: relative;
}
.select-wrap::before {
  content: '♥';
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: rgba(255,100,160,0.5); font-size: 11px; pointer-events: none; z-index: 1;
}
.page-select {
  width: 100%;
  background: rgba(60,0,50,0.6);
  border: 1px solid rgba(220,80,160,0.25);
  color: rgba(255,200,230,0.9);
  padding: 7px 12px 7px 28px;
  border-radius: 20px; font-size: 12px;
  cursor: pointer; outline: none;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.2px;
  backdrop-filter: blur(8px);
  appearance: none; -webkit-appearance: none;
}
.page-select option {
  background: #2d0028; color: #f0c0dc;
  font-family: 'Inter', sans-serif; font-size: 13px;
  padding: 6px 0;
}

/* Phone */
.phone {
  width: 390px; height: 844px;
  background: linear-gradient(160deg, #2d0030 0%, #1a0020 40%, #0d001a 100%);
  border-radius: 55px;
  box-shadow:
    0 0 0 12px #1e0022, 0 0 0 14px #2e0038,
    0 0 0 16px rgba(180,0,120,0.2),
    0 30px 80px rgba(120,0,80,0.7),
    0 0 60px rgba(160,0,100,0.2) inset;
  overflow: hidden; position: relative; display: flex; flex-direction: column;
  flex-shrink: 0; z-index: 10;
}
.status-bar {
  background: transparent; height: 50px; display: flex; align-items: center;
  justify-content: space-between; padding: 14px 24px 0; flex-shrink: 0; color: #ffb0d8;
}
.status-bar .time { font-size: 16px; font-weight: 700; }
.status-icons { display: flex; align-items: center; gap: 6px; }
.header {
  background: rgba(40,0,40,0.85); padding: 10px 16px;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  border-bottom: 1px solid rgba(200,60,140,0.25);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 10;
}
.back-btn { color: #ff80c0; font-size: 26px; cursor: pointer; line-height: 1; }
.user-info { display: flex; align-items: center; gap: 10px; flex: 1; }
.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(45deg, #c0006a, #8b00b0, #ff4d9d, #cc0077);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; font-weight: 700; flex-shrink: 0;
  box-shadow: 0 0 12px rgba(255,80,160,0.6);
}
.username { font-size: 15px; font-weight: 600; color: #ffcce8; font-family: 'Inter', sans-serif; }
.user-status { font-size: 12px; color: rgba(255,160,210,0.6); }
.header-actions { display: flex; gap: 16px; align-items: center; }

.messages-area {
  flex: 1; overflow-y: scroll; padding: 12px 16px 8px 12px;
  background: transparent; display: flex; flex-direction: column; gap: 2px;
  scrollbar-width: thin; scrollbar-color: rgba(180,0,120,0.4) transparent;
  position: relative;
}
.messages-area::before {
  content: '♥';
  position: sticky; top: 40%; left: 50%;
  transform: translateX(-50%);
  font-size: 180px; color: rgba(120,0,80,0.05);
  pointer-events: none; display: block; text-align: center;
  margin: -100px 0; z-index: 0; line-height: 1;
}
.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-track { background: transparent; }
.messages-area::-webkit-scrollbar-thumb { background: rgba(200,0,120,0.35); border-radius: 3px; }

.date-divider { text-align: center; margin: 14px 0 6px; flex-shrink: 0; position: relative; z-index: 1; }
.date-divider span {
  font-size: 11px; color: rgba(255,160,210,0.55);
  background: rgba(60,0,50,0.6); padding: 2px 12px; border-radius: 10px;
  backdrop-filter: blur(6px); letter-spacing: 0.3px;
}
.msg-row { display: flex; align-items: flex-end; gap: 6px; padding: 1px 0; position: relative; z-index: 1; }
.msg-row.sent { flex-direction: row-reverse; }
.msg-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: linear-gradient(45deg, #9900aa, #cc0077, #ff4499);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 9px; font-weight: 700; flex-shrink: 0;
}
.msg-avatar.hidden { visibility: hidden; }
.bubble-wrap { position: relative; max-width: 72%; }
.bubble {
  padding: 9px 13px; border-radius: 20px; font-size: 15px;
  line-height: 1.45; word-break: break-word; width: 100%;
}
.sent .bubble {
  background: linear-gradient(135deg, #b5006e 0%, #8800bb 100%);
  color: #fff; box-shadow: 0 2px 12px rgba(180,0,100,0.4);
}
.received .bubble {
  background: rgba(50,0,50,0.85); color: #f5d0e8;
  border: 1px solid rgba(180,60,140,0.25); backdrop-filter: blur(6px);
}
.sent .bubble.solo   { border-radius: 20px; }
.sent .bubble.first  { border-radius: 20px 20px 6px 20px; }
.sent .bubble.middle { border-radius: 20px 6px 6px 20px; }
.sent .bubble.last   { border-radius: 20px 6px 20px 20px; }
.received .bubble.solo   { border-radius: 20px; }
.received .bubble.first  { border-radius: 20px 20px 20px 6px; }
.received .bubble.middle { border-radius: 6px 20px 20px 6px; }
.received .bubble.last   { border-radius: 6px 20px 20px 20px; }
.reaction-badge {
  position: absolute; bottom: -11px;
  background: rgba(40,0,40,0.95);
  border: 1.5px solid rgba(180,0,100,0.4);
  border-radius: 20px; padding: 1px 6px;
  font-size: 13px; line-height: 1.4; white-space: nowrap;
  box-shadow: 0 2px 8px rgba(120,0,80,0.4);
}
.sent .reaction-badge { left: 4px; }
.received .reaction-badge { right: 4px; }
.has-reaction { margin-bottom: 14px; }
.input-bar {
  background: rgba(30,0,30,0.9); padding: 8px 12px 20px;
  display: flex; align-items: center; gap: 10px;
  border-top: 1px solid rgba(180,0,120,0.2); flex-shrink: 0;
  backdrop-filter: blur(12px);
}
.input-box {
  flex: 1; background: rgba(60,0,50,0.7);
  border: 1px solid rgba(200,60,140,0.3); border-radius: 22px;
  padding: 9px 16px; color: rgba(255,180,220,0.5); font-size: 15px;
  outline: none; font-family: inherit;
}
.scroll-btn {
  position: absolute; bottom: 80px; right: 20px; width: 40px; height: 40px;
  border-radius: 50%; background: linear-gradient(135deg, #a0005a, #700090);
  border: 1.5px solid rgba(255,120,180,0.4); color: #fff;
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s; z-index: 10;
  box-shadow: 0 2px 12px rgba(160,0,100,0.6); font-family: inherit;
}
.scroll-btn.visible { opacity: 1; }
.phone-loading {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #2d0030 0%, #1a0020 50%, #0d001a 100%);
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  gap: 14px; z-index: 20; transition: opacity 0.4s;
}
.phone-loading.hidden { opacity: 0; pointer-events: none; }
.loading-heart { font-size: 36px; animation: pulse 0.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.25);} }
.loading-bar { width: 160px; height: 3px; background: rgba(100,0,80,0.4); border-radius: 2px; overflow: hidden; }
.loading-fill {
  height: 100%; background: linear-gradient(90deg, #cc0077, #9900cc, #ff4499);
  border-radius: 2px; width: 0%; transition: width 0.05s;
}
.loading-label { color: rgba(255,160,210,0.7); font-size: 12px; letter-spacing: 0.5px; }

/* Bottom nav */
.bottom-nav {
  display: flex; align-items: center; gap: 8px;
  max-width: 440px; width: 100%; padding: 0 16px;
  justify-content: center; position: relative; z-index: 10;
}
.page-counter {
  color: rgba(255,160,210,0.45); font-size: 12px;
  letter-spacing: 1px; font-weight: 300;
}

@media (max-width: 440px) {
  body { padding: 8px 0 8px; gap: 6px; }

  .top-nav { padding: 0 10px; gap: 5px; max-width: 100%; }
  .title-card { padding: 6px 12px 5px; }
  .title-names { font-size: 13px; }
  .title-page { font-size: 9px; }
  .title-dates { font-size: 10px; }
  .title-heart { display: none; }

  .nav-row { gap: 4px; }
  .select-wrap { flex: 1; min-width: 0; }
  .nav-btn { padding: 5px 9px; font-size: 12px; }
  .bookmark-btn { padding: 5px 9px; font-size: 12px; gap: 3px; }
  .page-select { font-size: 10px; padding: 5px 4px 5px 20px; }
  .bookmark-badge { font-size: 10px; }

  .phone {
    width: calc(100vw - 16px);
    height: calc(100svh - 155px);
    min-height: 500px;
    border-radius: 36px;
    box-shadow:
      0 0 0 7px #1e0022,
      0 0 0 9px #2e0038,
      0 0 0 11px rgba(180,0,120,0.15),
      0 12px 40px rgba(120,0,80,0.6);
  }

  .bottom-nav { display: flex; max-width: 100%; padding: 0 10px; }
  .status-bar { display: flex; }
  .input-bar { padding: 6px 10px 12px; }
  .scroll-btn { bottom: 68px; right: 12px; width: 34px; height: 34px; font-size: 16px; }
}
</style>
</head>

<div class="hearts-bg" id="heartsBg"></div>

<div class="top-nav">

const BOOKMARK_KEY = 'hana_chat_bookmark';

function saveBookmark() {
  const data = { page: currentPage, label: PAGE_LABELS[currentPage-1], savedAt: Date.now() };
  localStorage.setItem(BOOKMARK_KEY, JSON.stringify(data));
  // Button feedback
  const btn = document.getElementById('bookmarkBtn');
  btn.textContent = '✓ Saved!';
  btn.classList.add('saved');
  setTimeout(() => { btn.innerHTML = '🔖 Save'; btn.classList.remove('saved'); }, 1800);
  updateBookmarkBadge();
  showToast('Bookmark saved — page ' + currentPage + ' 🔖');
}

function removeBookmark() {
  localStorage.removeItem(BOOKMARK_KEY);
  updateBookmarkBadge();
  showToast('Bookmark removed 🗑️');
}

function updateBookmarkBadge() {
  const raw = localStorage.getItem(BOOKMARK_KEY);
  const badge = document.getElementById('bookmarkBadge');
  const badgePage = document.getElementById('bookmarkBadgePage');
  if (!raw) { badge.style.display = 'none'; return; }
  const data = JSON.parse(raw);
  badgePage.textContent = data.page;
  badge.style.display = 'inline-flex';
  badge.style.cursor = 'pointer';
  badge.title = 'Tap to go back to page ' + data.page;
  badge.onclick = () => goPage(data.page);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// On load — check for saved bookmark and offer to resume
(function checkBookmarkOnLoad() {
  const raw = localStorage.getItem(BOOKMARK_KEY);
  if (!raw) return;
  const data = JSON.parse(raw);
  if (data.page && data.page > 1) {
    // Small delay so page renders first
    setTimeout(() => {
      showToast('Welcome back 🌸 Continue from page ' + data.page + '?');

      const t = document.getElementById('toast');
      t.style.pointerEvents = 'auto';
      t.style.cursor = 'pointer';
      t.onclick = () => {
        goPage(data.page);
        t.classList.remove('show');
        t.style.pointerEvents = 'none';
        t.style.cursor = 'default';
        t.onclick = null;
      };
      // Auto-dismiss after 6s
      setTimeout(() => {
        t.classList.remove('show');
        t.style.pointerEvents = 'none';
        t.style.cursor = 'default';
        t.onclick = null;
      }, 6000);

})();

  }
  document.getElementById('titleDates').textContent=datesStr;
  document.getElementById('pageCounter').textContent=p+' \u2022 '+NUM_PAGES;
}

function renderPage(msgs){
  const container=document.getElementById('msgContainer');
  const fill=document.getElementById('loadingFill');
  const lbl=document.getElementById('loadingLabel');
  const loader=document.getElementById('phoneLoading');
  loader.classList.remove('hidden');fill.style.width='0%';lbl.textContent='Loading\u2026';
  container.innerHTML='';
  const total=msgs.length,CHUNK=100;let i=0,lastDate='',html='';
  function chunk(){
    const end=Math.min(i+CHUNK,total);
    for(;i<end;i++){
      const msg=msgs[i];const isSent=msg.sender===SENT_USER;const side=isSent?'sent':'received';
      const ds=formatDate(msg.time);
      if(ds!==lastDate){html+='<div class="date-divider"><span>'+ds+'</span></div>';lastDate=ds;}
      const prev=msgs[i-1],next=msgs[i+1];
      const ps=prev&&prev.sender===msg.sender&&formatDate(prev.time)===ds;
      const ns=next&&next.sender===msg.sender&&formatDate(next.time)===ds;
      const pos=ps&&ns?'middle':ps?'last':ns?'first':'solo';
      let rb='';
      if(msg.reactions&&msg.reactions.length){const emojis=[...new Set(msg.reactions.map(r=>r.emoji))];rb='<div class="reaction-badge">'+emojis.join('')+'</div>';}
      const wc='bubble-wrap'+(rb?' has-reaction':'');
      const bh='<div class="'+wc+'"><div class="bubble '+pos+'">'+esc(msg.text)+'</div>'+rb+'</div>';
      const sa=!isSent&&(pos==='last'||pos==='solo');
      const av=!isSent?'<div class="msg-avatar'+(sa?'':' hidden')+'">BK</div>':'';
      html+='<div class="msg-row '+side+'">'+(isSent?bh:av+bh)+'</div>';
    }
    fill.style.width=Math.round(i/total*100)+'%';
    lbl.textContent='Loading\u2026 '+Math.round(i/total*100)+'%';
    if(i<total){requestAnimationFrame(chunk);}
    else{container.innerHTML=html;document.getElementById('messagesArea').scrollTop=0;loader.classList.add('hidden');}
  }
  chunk();
}
function goPage(n){
  if(n<1||n>NUM_PAGES)return;
  currentPage=n;
  updateNav();
  window.scrollTo({top:0,behavior:'smooth'});
  fetch('pages/p'+n+'.json')
    .then(r=>r.json())
    .then(msgs=>renderPage(msgs))
    .catch(()=>{
      document.getElementById('msgContainer').innerHTML='<p style="color:rgba(255,160,210,0.5);text-align:center;padding:40px">Could not load page '+n+'</p>';
      document.getElementById('phoneLoading').classList.add('hidden');
    });
}
function scrollToBottom(){document.getElementById('messagesArea').scrollTo({top:999999999,behavior:'smooth'});}
document.getElementById('messagesArea').addEventListener('scroll',function(){document.getElementById('scrollBtn').classList.toggle('visible',this.scrollHeight-this.scrollTop-this.clientHeight>200);});
updateNav();goPage(1);

// ── Mobile: set phone height precisely ──────────────────────
if (window.innerWidth <= 440) {
  function setPhoneHeight() {
    const nav = document.querySelector('.top-nav');
    const bottom = document.querySelector('.bottom-nav');
    const navH = nav ? nav.getBoundingClientRect().height : 0;
    const botH = bottom ? bottom.getBoundingClientRect().height : 0;
    const bodyPad = 22; // top + bottom body padding + gaps
    const phone = document.querySelector('.phone');
    if (phone) {
      const available = window.innerHeight - navH - botH - bodyPad;
      phone.style.height = Math.max(available, 480) + 'px';
    }
  }
  setTimeout(setPhoneHeight, 100);
  window.addEventListener('resize', setPhoneHeight);
}

function goBackToHome() {
  window.location.href = 'https://aam1rshaikh.github.io/hana/#instagram-chat';
}
